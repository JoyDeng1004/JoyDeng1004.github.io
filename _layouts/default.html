<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- 浏览器标签页标题:文章页用文章标题,首页用站点标题 -->
<title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }} — Personal Site{% endif %}</title>

<!-- SEO 描述:文章页可以在 front matter 里设 description 覆盖 -->
<meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
<meta name="author" content="{{ site.author.name }}">

<!-- 社交分享卡片 -->
<meta property="og:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}">
<meta property="og:description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
<meta property="og:url" content="{{ page.url | absolute_url }}">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Newsreader:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Noto+Sans+SC:wght@400;500&family=Noto+Serif+SC:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0d14;
    --bg-elev: #0f131c;
    --grid: rgba(255, 255, 255, 0.025);
    --text: #e8e4dc;
    --text-dim: #8a8676;
    --text-faint: #4a4738;
    --accent: #f5a663;
    --accent-dim: #8a5e3a;
    --line: rgba(232, 228, 220, 0.08);
    --line-strong: rgba(232, 228, 220, 0.15);
    --mono: 'JetBrains Mono', 'Noto Sans SC', ui-monospace, monospace;
    --serif: 'Newsreader', 'Noto Serif SC', Georgia, serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--serif);
    font-size: 17px;
    line-height: 1.65;
    min-height: 100vh;
    overflow-x: hidden;
    background-image:
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size: 48px 48px;
    background-position: -1px -1px;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 0%, rgba(0,0,0,0.4) 100%);
    pointer-events: none;
    z-index: 1;
  }

  .container {
    max-width: 720px;
    margin: 0 auto;
    padding: 64px 32px 120px;
    position: relative;
    z-index: 2;
  }

  /* ===== TOP NAV ===== */
  .top-nav {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10, 13, 20, 0.7);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--line);
  }
  .top-nav-inner {
    max-width: 720px;
    margin: 0 auto;
    padding: 14px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
  }
  .top-nav-brand {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text);
    text-decoration: none;
    letter-spacing: 0.05em;
    white-space: nowrap;
  }
  .top-nav-brand::before {
    content: '~/';
    color: var(--accent);
    margin-right: 2px;
  }
  .top-nav-links {
    display: flex;
    gap: 24px;
    list-style: none;
  }
  .top-nav-links a {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-dim);
    text-decoration: none;
    letter-spacing: 0.05em;
    transition: color 0.2s ease;
  }
  .top-nav-links a::before {
    content: '/';
    color: var(--text-faint);
    margin-right: 1px;
  }
  .top-nav-links a:hover { color: var(--accent); }

  /* ===== HERO ===== */
  .hero {
    position: relative;
    min-height: 60vh;
    display: flex;
    align-items: center;
    overflow: hidden;
    border-bottom: 1px solid var(--line);
    background:
      radial-gradient(ellipse at 70% 60%, rgba(245, 166, 99, 0.06) 0%, transparent 60%),
      radial-gradient(ellipse at 20% 30%, rgba(80, 130, 200, 0.04) 0%, transparent 60%),
      linear-gradient(180deg, var(--bg) 0%, var(--bg-elev) 100%);
  }
  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 12% 18%, rgba(255, 255, 255, 1), transparent 50%),
      radial-gradient(1px 1px at 28% 42%, rgba(255, 255, 255, 0.9), transparent 50%),
      radial-gradient(1px 1px at 45% 78%, rgba(255, 255, 255, 0.95), transparent 50%),
      radial-gradient(1px 1px at 62% 24%, rgba(255, 255, 255, 1), transparent 50%),
      radial-gradient(1px 1px at 78% 56%, rgba(255, 255, 255, 0.85), transparent 50%),
      radial-gradient(1px 1px at 92% 82%, rgba(255, 255, 255, 0.9), transparent 50%),
      radial-gradient(1px 1px at 8% 88%, rgba(255, 255, 255, 0.8), transparent 50%),
      radial-gradient(1px 1px at 55% 8%, rgba(255, 255, 255, 0.95), transparent 50%),
      radial-gradient(2px 2px at 35% 60%, rgba(255, 255, 255, 1), transparent 50%),
      radial-gradient(2px 2px at 72% 88%, rgba(255, 255, 255, 0.9), transparent 50%),
      radial-gradient(2px 2px at 18% 35%, rgba(255, 255, 255, 0.95), transparent 50%),
      radial-gradient(2.5px 2.5px at 85% 32%, rgba(245, 166, 99, 0.9), transparent 50%),
      radial-gradient(2.5px 2.5px at 22% 70%, rgba(245, 166, 99, 0.8), transparent 50%);
    background-size: 280px 280px;
    background-repeat: repeat;
    pointer-events: none;
    animation: drift 90s linear infinite, twinkle 4s ease-in-out infinite;
  }
  @keyframes drift {
    from { background-position: 0 0; }
    to { background-position: -280px -280px; }
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0.85; }
    50% { opacity: 1; }
  }
  .hero-inner {
    position: relative;
    z-index: 2;
    max-width: 720px;
    width: 100%;
    margin: 0 auto;
    padding: 96px 32px;
  }
  .hero .meta-bar { margin-bottom: 48px; }
  .hero + .container { padding-top: 64px; }

  /* ===== META BAR & HERO TEXT ===== */
  .meta-bar {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    display: flex;
    justify-content: space-between;
  }
  .meta-bar .status { color: var(--accent); }
  .meta-bar .status::before {
    content: '●';
    margin-right: 8px;
    animation: pulse 2.5s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 1; }
  }
  h1.name {
    font-family: var(--serif);
    font-size: 64px;
    font-weight: 500;
    line-height: 1;
    letter-spacing: -0.03em;
    margin-bottom: 24px;
  }
  h1.name .cursor {
    display: inline-block;
    width: 0.5ch;
    height: 0.85em;
    background: var(--accent);
    margin-left: 4px;
    vertical-align: -0.05em;
    animation: blink 1.1s steps(1) infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }
  .tagline {
    font-family: var(--serif);
    font-style: italic;
    font-size: 19px;
    color: var(--text-dim);
    max-width: 540px;
  }
  .tagline em {
    color: var(--text);
    font-style: normal;
  }

  /* ===== SECTION ===== */
  section { margin-bottom: 72px; }
  .section-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.18em;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .section-label::before {
    content: '';
    width: 24px;
    height: 1px;
    background: var(--accent-dim);
  }

  /* ===== /now ===== */
  .now-grid {
    display: grid;
    grid-template-columns: 100px 1fr;
    gap: 12px 24px;
    font-size: 15px;
  }
  .now-grid dt {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding-top: 4px;
  }
  .now-grid dd { color: var(--text); line-height: 1.55; }
  .now-grid dd .tag {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--accent);
    background: rgba(245, 166, 99, 0.08);
    border: 1px solid var(--accent-dim);
    padding: 1px 6px;
    border-radius: 2px;
    margin-right: 4px;
  }

  /* ===== POST LIST (首页文章列表) ===== */
  .posts { list-style: none; }
  .posts li {
    border-top: 1px solid var(--line);
    padding: 20px 0;
    transition: padding 0.25s ease;
  }
  .posts li:last-child { border-bottom: 1px solid var(--line); }
  .posts a {
    display: grid;
    grid-template-columns: 110px 1fr;
    gap: 24px;
    align-items: baseline;
    color: var(--text);
    text-decoration: none;
    transition: color 0.2s ease;
  }
  .posts li:hover { padding-left: 12px; }
  .posts li:hover a { color: var(--accent); }
  .posts .date {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 0.05em;
  }
  .posts .title {
    font-family: var(--serif);
    font-size: 18px;
    font-weight: 500;
  }
  .posts .empty {
    font-family: var(--serif);
    font-style: italic;
    color: var(--text-dim);
    padding: 8px 0;
    display: block;
  }

  /* ===== STACK ===== */
  .stack-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .stack-list span {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-dim);
    border: 1px solid var(--line-strong);
    padding: 4px 10px;
    border-radius: 2px;
    transition: all 0.2s ease;
  }
  .stack-list span:hover {
    color: var(--accent);
    border-color: var(--accent-dim);
  }

  /* ===== FOOTER ===== */
  .site-footer {
    border-top: 1px solid var(--line);
    margin-top: 96px;
  }
  .site-footer-inner {
    max-width: 720px;
    margin: 0 auto;
    padding: 32px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-dim);
  }
  .site-footer a {
    color: var(--text-dim);
    text-decoration: none;
    transition: color 0.2s ease;
    margin-right: 16px;
  }
  .site-footer a:hover { color: var(--accent); }
  .site-footer a::before {
    content: '→ ';
    color: var(--text-faint);
  }

  /* ===== POST PAGE (文章详情页) ===== */
  .post-header {
    padding: 64px 0 40px;
    border-bottom: 1px solid var(--line);
    margin-bottom: 48px;
  }
  .post-meta {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 16px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 0.05em;
    margin-bottom: 20px;
  }
  .post-tags {
    list-style: none;
    display: flex;
    gap: 8px;
  }
  .post-tags li { color: var(--accent); }
  .post-tags li::before { content: '#'; }
  .post-title {
    font-family: var(--serif);
    font-size: 42px;
    font-weight: 500;
    letter-spacing: -0.02em;
    line-height: 1.2;
    color: var(--text);
  }

  .post-content {
    font-family: var(--serif);
    font-size: 17px;
    line-height: 1.75;
    color: var(--text);
  }
  .post-content > * + * { margin-top: 1.2em; }
  .post-content h2 {
    font-size: 28px;
    font-weight: 500;
    margin-top: 2em;
    margin-bottom: 0.4em;
    letter-spacing: -0.01em;
  }
  .post-content h3 {
    font-size: 21px;
    font-weight: 500;
    margin-top: 1.6em;
    margin-bottom: 0.3em;
  }
  .post-content h4 {
    font-size: 17px;
    font-weight: 600;
    margin-top: 1.4em;
    margin-bottom: 0.2em;
  }
  .post-content a {
    color: var(--accent);
    text-decoration: none;
    border-bottom: 1px solid var(--accent-dim);
    transition: border-color 0.2s ease;
  }
  .post-content a:hover { border-bottom-color: var(--accent); }
  .post-content strong { color: var(--text); font-weight: 600; }
  .post-content em { font-style: italic; }
  .post-content blockquote {
    border-left: 2px solid var(--accent-dim);
    padding-left: 1.2em;
    color: var(--text-dim);
    font-style: italic;
  }
  .post-content ul,
  .post-content ol {
    padding-left: 1.6em;
  }
  .post-content li + li { margin-top: 0.4em; }
  .post-content code {
    font-family: var(--mono);
    font-size: 0.88em;
    background: rgba(245, 166, 99, 0.08);
    border: 1px solid var(--line-strong);
    color: var(--accent);
    padding: 1px 6px;
    border-radius: 2px;
  }
  .post-content pre {
    background: var(--bg-elev);
    border: 1px solid var(--line-strong);
    border-radius: 4px;
    padding: 16px 20px;
    overflow-x: auto;
    font-size: 14px;
    line-height: 1.6;
  }
  .post-content pre code {
    background: none;
    border: none;
    padding: 0;
    color: var(--text);
    font-size: inherit;
  }
  .post-content img {
    max-width: 100%;
    height: auto;
    border-radius: 4px;
    display: block;
  }
  .post-content hr {
    border: none;
    border-top: 1px solid var(--line);
    margin: 3em 0;
  }
  .post-content table {
    width: 100%;
    border-collapse: collapse;
    font-size: 15px;
  }
  .post-content th,
  .post-content td {
    text-align: left;
    padding: 10px 12px;
    border-bottom: 1px solid var(--line);
  }
  .post-content th {
    font-family: var(--mono);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-dim);
  }
  /* MathJax 长公式横向滚动而不是溢出 */
  .post-content mjx-container {
    overflow-x: auto;
    overflow-y: hidden;
    max-width: 100%;
  }

  .post-nav {
    margin-top: 80px;
    padding-top: 32px;
    border-top: 1px solid var(--line);
  }
  .post-nav a {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-dim);
    text-decoration: none;
    letter-spacing: 0.05em;
  }
  .post-nav a:hover { color: var(--accent); }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 600px) {
    .container { padding: 40px 20px 80px; }
    .top-nav-inner { padding: 12px 20px; }
    .top-nav-brand { font-size: 11px; }
    .top-nav-links { gap: 14px; }
    .top-nav-links a { font-size: 11px; }
    .hero { min-height: 50vh; }
    .hero-inner { padding: 64px 20px; }
    h1.name { font-size: 44px; }
    .tagline { font-size: 17px; }
    .now-grid { grid-template-columns: 1fr; gap: 4px 0; }
    .now-grid dt { padding-top: 16px; }
    .now-grid dt:first-of-type { padding-top: 0; }
    .posts a { grid-template-columns: 1fr; gap: 6px; }
    .site-footer-inner { flex-direction: column; gap: 16px; align-items: flex-start; padding: 32px 20px; }
    .post-header { padding: 40px 0 32px; }
    .post-title { font-size: 30px; }
    .post-content { font-size: 16px; }
    .post-content h2 { font-size: 24px; }
    .post-content h3 { font-size: 19px; }
  }

  /* ===== ENTRANCE ANIMATION ===== */
  .reveal {
    opacity: 0;
    transform: translateY(12px);
    animation: reveal 0.7s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
  }
  @keyframes reveal {
    to { opacity: 1; transform: translateY(0); }
  }
  .reveal-1 { animation-delay: 0.05s; }
  .reveal-2 { animation-delay: 0.15s; }
  .reveal-3 { animation-delay: 0.25s; }
  .reveal-4 { animation-delay: 0.35s; }
  .reveal-5 { animation-delay: 0.45s; }
  .reveal-6 { animation-delay: 0.55s; }
</style>
</head>
<body>

<!-- 顶部导航条 (全站共用) -->
<nav class="top-nav">
  <div class="top-nav-inner">
    <a href="{{ '/' | relative_url }}" class="top-nav-brand">{{ site.title | downcase }}</a>
    <ul class="top-nav-links">
      <li><a href="{{ '/#writing' | relative_url }}">writing</a></li>
      <li><a href="{{ '/#now' | relative_url }}">about</a></li>
      <li><a href="https://github.com/{{ site.github_username }}" target="_blank" rel="noopener">github</a></li>
    </ul>
  </div>
</nav>

<!-- 这里是占位符:每个具体页面的内容会被 Jekyll 插到这里 -->
{{ content }}

<!-- 全站统一 footer -->
<footer class="site-footer">
  <div class="site-footer-inner">
    <div>
      <a href="mailto:{{ site.author.email }}">email</a>
      <a href="https://github.com/{{ site.github_username }}">github</a>
    </div>
    <div>© {{ 'now' | date: "%Y" }} — built by hand</div>
  </div>
</footer>

</body>
</html>
